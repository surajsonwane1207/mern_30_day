<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 300px;
            text-align: center;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100px;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            margin-top: -60px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            object-fit: cover;
        }

        .profile-info {
            padding: 20px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin: 15px 0 5px 0;
        }

        .profile-title {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .profile-bio {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .stat {
            flex: 1;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .profile-actions {
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="card-header"></div>
        <img src="https://i.pravatar.cc/150?img=12" alt="Profile" class="profile-image">
        <div class="profile-info">
            <h2 class="profile-name">John Doe</h2>
            <p class="profile-title">Full Stack Developer</p>
            <p class="profile-bio">Passionate about building amazing web applications and solving complex problems.</p>
            
            <div class="profile-stats">
                <div class="stat">
                    <div class="stat-value">2.5K</div>
                    <div class="stat-label">Followers</div>
                </div>
                <div class="stat">
                    <div class="stat-value">450</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat">
                    <div class="stat-value">89</div>
                    <div class="stat-label">Posts</div>
                </div>
            </div>

            <div class="profile-actions">
                <button class="btn-primary">Follow</button>
                <button class="btn-secondary">Message</button>
            </div>
        </div>
    </div>
</body>
</html>
